\* TLC model configuration for ConsistentFailover.tla
\*
\* Simulation model: 2 clusters, 9 region servers.
\* Safety-only (no Fairness). Samples random behaviors at
\* production-scale RS count to stress per-RS writer interleaving.
\* Liveness simulation uses a separate cfg with smaller RS.
\*
\* Run:
\* java -XX:+UseParallelGC \
\*   -Dtlc2.TLC.stopAfter=28800 \
\*   -cp tla2tools.jar:CommunityModules-deps.jar \
\*   tlc2.TLC ConsistentFailover.tla -config ConsistentFailover-sim.cfg \
\*   -simulate -depth 10000 -workers auto

SPECIFICATION SafetySpec

\* Model values
CONSTANTS
    \* The finite set of cluster identifiers forming the HA pair.
    Cluster = {c1, c2}
    \* The finite set of region server identifiers per cluster.
    \* 9 RS exercises per-RS writer interleaving at production scale.
    RS = {rs1, rs2, rs3, rs4, rs5, rs6, rs7, rs8, rs9}
    \* Anti-flapping wait threshold (logical time ticks).
    \* Larger than the exhaustive model to explore richer
    \* interleavings during the anti-flapping wait window
    \* (HDFS failures, ZK disruptions, RS crashes while gate closed).
    WaitTimeForSync = 5
    \* Feature gate for proactive AWOP/ANISWOP modeling.
    \* Set to TRUE to verify OFFLINE peer detection lifecycle.
    UseOfflinePeerDetection = FALSE

\* No SYMMETRY -- provides no benefit for random trace sampling.

\* Invariants to check
INVARIANT
    TypeOK
    MutualExclusion
    AbortSafety
    AISImpliesInSync
    WriterClusterConsistency
    ZKSessionConsistency

\* Action properties: every state change follows allowed transitions
ACTION_CONSTRAINT
    TransitionValid
    WriterTransitionValid
    AIStoATSPrecondition
    AntiFlapGate
    ANISTStoATSPrecondition
    ReplayTransitionValid
    FailoverTriggerCorrectness
    NoDataLoss
    ReplayRewindCorrectness

\* No state constraint -- simulation samples random traces,
\* counters grow organically along each trace without
\* state-space tractability concerns.
